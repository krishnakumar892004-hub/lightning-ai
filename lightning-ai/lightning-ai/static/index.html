<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0c10;
    --panel: #131620;
    --panel-2: #191d2b;
    --volt: #d7ff3e;
    --violet: #7c5cff;
    --text: #eef0f6;
    --muted: #8890a6;
    --border: #232838;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ambient bolt background */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(600px circle at 15% 10%, rgba(124,92,255,0.12), transparent 60%),
      radial-gradient(500px circle at 85% 90%, rgba(215,255,62,0.07), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  header{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 28px;
    border-bottom:1px solid var(--border);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:-0.02em;
  }
  .bolt{
    width:20px;
    height:26px;
    flex-shrink:0;
  }
  .bolt path{
    fill:var(--volt);
    filter:drop-shadow(0 0 6px rgba(215,255,62,0.6));
  }
  .status{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--volt);
    box-shadow:0 0 8px var(--volt);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.35;}
  }

  main{
    flex:1;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
  }

  #chat{
    flex:1;
    overflow-y:auto;
    padding:28px 4px 10px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .empty{
    margin:auto;
    text-align:center;
    color:var(--muted);
    max-width:420px;
  }
  .empty .bolt-big{
    width:34px;height:44px;margin:0 auto 18px;
  }
  .empty .bolt-big path{
    fill:var(--violet);
    filter:drop-shadow(0 0 14px rgba(124,92,255,0.5));
  }
  .empty h1{
    font-size:1.5rem;
    color:var(--text);
    margin:0 0 8px;
    letter-spacing:-0.02em;
  }
  .empty p{
    font-size:0.92rem;
    line-height:1.5;
    margin:0;
  }

  .msg{
    display:flex;
    gap:12px;
    max-width:100%;
    animation:rise 0.25s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .msg.user{ flex-direction:row-reverse; }
  .avatar{
    width:28px;height:28px;
    border-radius:7px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.7rem;
    font-weight:700;
    font-family:'JetBrains Mono', monospace;
  }
  .msg.ai .avatar{ background:var(--violet); color:#fff; }
  .msg.user .avatar{ background:var(--panel-2); color:var(--volt); border:1px solid var(--border); }

  .bubble{
    padding:12px 16px;
    border-radius:12px;
    font-size:0.94rem;
    line-height:1.55;
    max-width:78%;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.ai .bubble{
    background:var(--panel);
    border:1px solid var(--border);
    border-top-left-radius:2px;
  }
  .msg.user .bubble{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-top-right-radius:2px;
    color:var(--text);
  }

  .typing{
    display:flex;
    gap:4px;
    padding:4px 0;
  }
  .typing span{
    width:6px;height:6px;
    border-radius:50%;
    background:var(--muted);
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{
    0%,60%,100%{ transform:translateY(0); opacity:0.4; }
    30%{ transform:translateY(-4px); opacity:1; }
  }

  .toolbar{
    position:relative;
    z-index:1;
    display:flex;
    gap:8px;
    padding:10px 4px 0;
    flex-wrap:wrap;
  }
  .tool-btn{
    background:var(--panel);
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:20px;
    padding:7px 14px;
    font-size:0.78rem;
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    cursor:pointer;
    transition:all 0.15s;
  }
  .tool-btn:hover{ border-color:var(--violet); color:var(--text); }
  .tool-btn.active{
    background:var(--violet);
    color:#fff;
    border-color:var(--violet);
  }
  .preview-wrap{
    position:relative;
    display:inline-block;
    margin:0 4px 10px;
  }
  .preview-wrap img{
    max-height:70px;
    border-radius:8px;
    border:1px solid var(--border);
  }
  .preview-wrap button{
    position:absolute;
    top:-6px; right:-6px;
    width:18px; height:18px;
    border-radius:50%;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    font-size:0.65rem;
    padding:0;
    line-height:1;
    cursor:pointer;
  }
  .gen-image{
    max-width:280px;
    border-radius:12px;
    border:1px solid var(--border);
    display:block;
    margin-top:4px;
  }

  form{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:10px 4px 24px;
    border-top:1px solid var(--border);
  }
  .input-row{
    display:flex;
    gap:10px;
  }
  textarea{
    flex:1;
    resize:none;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    font-size:0.95rem;
    padding:13px 16px;
    outline:none;
    transition:border-color 0.15s;
    max-height:140px;
  }
  textarea:focus{ border-color:var(--violet); }
  textarea::placeholder{ color:var(--muted); }

  button{
    background:var(--volt);
    color:#0b0c10;
    border:none;
    border-radius:12px;
    padding:0 20px;
    font-weight:700;
    font-family:'Space Grotesk', sans-serif;
    font-size:0.9rem;
    cursor:pointer;
    transition:transform 0.1s, box-shadow 0.15s;
    display:flex;
    align-items:center;
    gap:6px;
  }
  button:hover{ box-shadow:0 0 20px rgba(215,255,62,0.35); }
  button:active{ transform:scale(0.97); }
  button:disabled{ opacity:0.5; cursor:not-allowed; box-shadow:none; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:8px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="bolt" viewBox="0 0 20 26"><path d="M12 0L0 15h7l-2 11L20 10h-8L14 0z"/></svg>
    Lightning AI
  </div>
  <div class="status"><span class="dot"></span><span id="status-text">connecting</span></div>
</header>

<main>
  <div id="chat">
    <div class="empty" id="empty-state">
      <svg class="bolt-big" viewBox="0 0 20 26"><path d="M12 0L0 15h7l-2 11L20 10h-8L14 0z"/></svg>
      <h1>Ask anything</h1>
      <p>Chat, generate images, or upload a photo to ask about it. Pick a mode below and go.</p>
    </div>
  </div>

  <div class="toolbar">
    <button type="button" class="tool-btn" id="mode-chat" data-mode="chat">💬 Chat</button>
    <button type="button" class="tool-btn" id="mode-image" data-mode="image">🎨 Generate Image</button>
    <button type="button" class="tool-btn" id="upload-btn">📎 Upload Image</button>
    <input type="file" id="file-input" accept="image/*" hidden>
  </div>

  <form id="chat-form">
    <div id="preview-area"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Message Lightning AI..." autofocus></textarea>
      <button type="submit" id="send-btn">Send</button>
    </div>
  </form>
</main>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  let emptyState = document.getElementById('empty-state');
  const statusText = document.getElementById('status-text');
  const modeChatBtn = document.getElementById('mode-chat');
  const modeImageBtn = document.getElementById('mode-image');
  const uploadBtn = document.getElementById('upload-btn');
  const fileInput = document.getElementById('file-input');
  const previewArea = document.getElementById('preview-area');

  const sessionId = 'session-' + Math.random().toString(36).slice(2, 10);

  let currentMode = 'chat'; // 'chat' | 'image'
  let pendingImageBase64 = null;

  function setMode(mode) {
    currentMode = mode;
    modeChatBtn.classList.toggle('active', mode === 'chat');
    modeImageBtn.classList.toggle('active', mode === 'image');
    input.placeholder = mode === 'image'
      ? 'Describe the image you want to generate...'
      : 'Message Lightning AI...';
  }
  modeChatBtn.addEventListener('click', () => setMode('chat'));
  modeImageBtn.addEventListener('click', () => setMode('image'));
  setMode('chat');

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      pendingImageBase64 = reader.result; // data URL
      previewArea.innerHTML = `
        <div class="preview-wrap">
          <img src="${reader.result}" alt="upload preview">
          <button type="button" id="remove-preview">✕</button>
        </div>
      `;
      document.getElementById('remove-preview').addEventListener('click', () => {
        pendingImageBase64 = null;
        previewArea.innerHTML = '';
        fileInput.value = '';
      });
      input.placeholder = 'Ask something about this image...';
      input.focus();
    };
    reader.readAsDataURL(file);
  });

  // Check backend status
  fetch('/api/status').then(r => r.ok ? statusText.textContent = 'online' : statusText.textContent = 'offline')
    .catch(() => statusText.textContent = 'offline');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function addMessage(role, text) {
    if (emptyState) { emptyState.remove(); emptyState = null; }
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    msg.innerHTML = `
      <div class="avatar">${role === 'ai' ? 'AI' : 'You'}</div>
      <div class="bubble">${text}</div>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg.querySelector('.bubble');
  }

  function addTyping() {
    if (emptyState) { emptyState.remove(); emptyState = null; }
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing-indicator';
    msg.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function addImageMessage(role, imgSrc) {
    if (emptyState) { emptyState.remove(); emptyState = null; }
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    msg.innerHTML = `
      <div class="avatar">${role === 'ai' ? 'AI' : 'You'}</div>
      <div class="bubble"><img class="gen-image" src="${imgSrc}" alt="generated image"></div>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    const hasImage = !!pendingImageBase64;

    if (!text && !hasImage) return;

    sendBtn.disabled = true;

    // --- MODE 1: Image generation ---
    if (currentMode === 'image' && text) {
      addMessage('user', escapeHtml(text));
      input.value = '';
      input.style.height = 'auto';
      addTyping();
      try {
        const res = await fetch('/generate-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });
        removeTyping();
        if (res.ok) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          addImageMessage('ai', url);
        } else {
          const errText = await res.text();
          addMessage('ai', escapeHtml(errText || 'Could not generate image.'));
        }
      } catch (err) {
        removeTyping();
        addMessage('ai', 'Connection error. Please try again.');
      }
      sendBtn.disabled = false;
      input.focus();
      return;
    }

    // --- MODE 2: Image upload + question (vision analysis) ---
    if (hasImage) {
      const question = text || 'What is in this image? Describe it in detail.';
      addImageMessage('user', pendingImageBase64);
      if (text) addMessage('user', escapeHtml(text));
      const imgToSend = pendingImageBase64;
      pendingImageBase64 = null;
      previewArea.innerHTML = '';
      fileInput.value = '';
      input.value = '';
      input.style.height = 'auto';
      input.placeholder = 'Message Lightning AI...';
      addTyping();
      try {
        const res = await fetch('/analyze-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: imgToSend, question })
        });
        const data = await res.json();
        removeTyping();
        addMessage('ai', escapeHtml(data.reply || 'No response.'));
      } catch (err) {
        removeTyping();
        addMessage('ai', 'Connection error. Please try again.');
      }
      sendBtn.disabled = false;
      input.focus();
      return;
    }

    // --- MODE 3: Normal chat ---
    addMessage('user', escapeHtml(text));
    input.value = '';
    input.style.height = 'auto';
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping();
      addMessage('ai', escapeHtml(data.reply || 'No response.'));
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Connection error. Please try again.');
    }
    sendBtn.disabled = false;
    input.focus();
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
